<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:20px;display:flex;align-items:center;gap:12px}
.push{background:#fff;border:1px solid #E3DCCC;border-radius:16px;padding:14px 16px;box-shadow:0 8px 24px -8px rgba(30,29,43,.12);display:flex;gap:12px;flex:1;max-width:420px;align-items:flex-start}
.mark{width:32px;height:32px;border-radius:8px;flex-shrink:0;background:#1E1D2B;display:flex;align-items:center;justify-content:center}
.mark img{width:24px;height:24px;border-radius:4px}
.h{font-family:var(--font-sans);font-size:14px;font-weight:600;color:#1E1D2B;margin:0 0 2px}
.b{font-family:var(--font-sans);font-size:13px;color:#3A3948;margin:0;line-height:1.4}
.t{font-family:var(--font-sans);font-size:11px;color:var(--fg-muted);margin-left:auto;flex-shrink:0}
</style></head><body><div class="card">
  <div class="push">
    <div class="mark"><img src="../assets/nouri-logo-darkbg.jpg"></div>
    <div>
      <p class="h">NOURI</p>
      <p class="b">Llevas 3 noches con sueño fragmentado. ¿Quieres anotar qué cambió?</p>
    </div>
    <span class="t">ahora</span>
  </div>
</div></body></html>
