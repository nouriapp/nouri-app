<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.c{background:#F4EEE3;border:1px solid #E3DCCC;border-radius:16px;padding:18px;box-shadow:0 2px 6px -2px rgba(30,29,43,.08),0 1px 2px rgba(30,29,43,.04)}
.eb{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);font-weight:500}
.t{font-family:var(--font-serif);font-size:22px;line-height:1.15;letter-spacing:-.01em;margin:8px 0 6px;color:#1E1D2B}
.p{font-family:var(--font-sans);font-size:14px;line-height:1.5;color:#3A3948;margin:0}
.dark{background:#1E1D2B;border-color:#1E1D2B;color:#F7F3EB}
.dark .eb{color:#D6C7FD;opacity:.85}
.dark .t{color:#F7F3EB}
.dark .p{color:#D9D6E0}
</style></head><body><div class="card">
  <div class="c">
    <div class="eb">SOFOCOS</div>
    <div class="t">Por qué tu termostato se volvió loco</div>
    <p class="p">La caída de estrógenos afecta el hipotálamo, y por eso tu cuerpo sobrerreacciona a pequeños cambios de temperatura.</p>
  </div>
  <div class="c dark">
    <div class="eb">ESTA SEMANA</div>
    <div class="t">3 noches con sueño fragmentado</div>
    <p class="p">Un patrón empieza a asomarse. ¿Quieres anotar qué cambió?</p>
  </div>
</div></body></html>
