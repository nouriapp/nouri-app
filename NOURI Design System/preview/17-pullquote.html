<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px}
.q{font-family:var(--font-serif);font-size:30px;line-height:1.2;letter-spacing:-.01em;color:#1E1D2B;margin:0;text-wrap:balance;max-width:600px}
.q em{color:#7B39D2}
.rule{width:32px;height:2px;background:#07B5B5;margin-bottom:18px}
.att{font-family:var(--font-sans);font-size:13px;color:var(--fg-muted);margin-top:14px;display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:50%;background:#D6C7FD}
</style></head><body><div class="card">
  <div class="rule"></div>
  <p class="q">"Llevaba dos años pensando que me estaba volviendo <em>loca</em>. Resulta que tenía 47."</p>
  <div class="att"><div class="av"></div>Marcela, 49 · Querétaro</div>
</div></body></html>
