<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:flex;flex-direction:column;gap:12px;max-width:420px}
label{font-family:var(--font-sans);font-size:13px;color:var(--fg);font-weight:500;margin-bottom:4px;display:block}
.inp{width:100%;font-family:var(--font-sans);font-size:15px;padding:12px 14px;border:1px solid #E3DCCC;border-radius:10px;background:#FBF7F1;color:#1E1D2B;outline:none;transition:all .14s}
.inp:focus{border-color:#7B39D2;box-shadow:0 0 0 3px rgba(123,57,210,.15)}
.inp::placeholder{color:#A3A1B2}
.hint{font-family:var(--font-sans);font-size:12px;color:var(--fg-muted);margin-top:6px}
.wrap{position:relative}
.ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6B6A7C}
svg{width:18px;height:18px}
</style></head><body><div class="card">
  <div><label>Correo</label><input class="inp" placeholder="ana@ejemplo.com" value="ana@ejemplo.com"></div>
  <div><label>¿Cómo te sientes hoy?</label>
    <div class="wrap"><input class="inp" placeholder="Describe en pocas palabras…"></div>
    <div class="hint">Guardado solo para ti. Nunca lo compartimos.</div>
  </div>
</div></body></html>
