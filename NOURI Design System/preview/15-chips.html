<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{font-family:var(--font-sans);font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid #E3DCCC;background:#FBF7F1;color:#3A3948;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.chip.on{background:#7B39D2;color:#fff;border-color:#7B39D2}
.chip.soft{background:#F6EFFE;color:#5B28A3;border-color:transparent}
.chip.teal{background:#CDEFEF;color:#044747;border-color:transparent}
.chip.warn{background:#F4E6CB;color:#7a521b;border-color:transparent}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
</style></head><body><div class="card">
  <span class="chip on">Sofocos</span>
  <span class="chip">Insomnio</span>
  <span class="chip">Ansiedad</span>
  <span class="chip">Dolor articular</span>
  <span class="chip">Niebla mental</span>
  <span class="chip soft"><span class="dot"></span>Perimenopausia</span>
  <span class="chip teal"><span class="dot"></span>Día 14 · folicular</span>
  <span class="chip warn"><span class="dot"></span>Sueño fragmentado</span>
</div></body></html>
