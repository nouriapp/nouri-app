<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0}
.card{background:linear-gradient(135deg,#1E1D2B 0%,#3A1B66 38%,#7B39D2 68%,#07B5B5 100%);padding:28px;min-height:180px;display:flex;flex-direction:column;justify-content:space-between;color:#F7F3EB}
.eb{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.75}

.foot{font-family:var(--font-mono);font-size:11px;opacity:.7}

  <div><div class="eb">Aurora · único gradiente permitido</div>
  <div class="h">Navy → Purple → Teal</div></div>

</div></body></html>
