<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:28px}
.mono{font-family:var(--font-mono);font-size:14px;color:var(--fg);line-height:1.7}
.row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px dashed var(--border)}
.row:last-child{border-bottom:none}
.lab{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);width:80px}
.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:17px;color:var(--fg);letter-spacing:.01em}
.em{font-family:var(--font-serif);font-style:italic;color:var(--nouri-purple);font-size:22px}
.pill{font-family:var(--font-sans);font-size:12px;background:var(--purple-50);color:var(--purple-700);padding:3px 8px;border-radius:999px}
</style></head><body><div class="card">
  <div class="row"><span class="lab">Mono</span><span class="mono">Geist Mono</span></div>
  <div class="row"><span class="lab">Tabular</span><span class="num">5h 42m · 102 bpm · 37.2°C</span></div>
  <div class="row"><span class="lab">Italic</span><span class="em">esto · ahora · contigo</span></div>
  <div class="row"><span class="lab">Micro</span><span class="pill">DÍA 14</span> <span class="pill" style="background:var(--teal-50);color:var(--teal-700)">FOLICULAR</span></div>
</div></body></html>
