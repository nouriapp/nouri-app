<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px}
.sw{border-radius:8px;padding:10px 8px;height:74px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px}
.sw .n{font-family:var(--font-sans);font-weight:600;font-size:11px}
.lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);font-weight:500;margin-bottom:8px;font-family:var(--font-sans)}
</style></head><body><div class="card">
  <div class="lab">Purple ramp</div>
  <div class="row">
    <div class="sw" style="background:#F6EFFE;color:#3A1B66"><span class="n">50</span><span>F6EFFE</span></div>
    <div class="sw" style="background:#EADCFE;color:#3A1B66"><span class="n">100</span><span>EADCFE</span></div>
    <div class="sw" style="background:#C2A3F3;color:#3A1B66"><span class="n">300</span><span>C2A3F3</span></div>
    <div class="sw" style="background:#9757E6;color:#fff"><span class="n">500</span><span>9757E6</span></div>
    <div class="sw" style="background:#7B39D2;color:#fff"><span class="n">600</span><span>7B39D2</span></div>
    <div class="sw" style="background:#5B28A3;color:#fff"><span class="n">700</span><span>5B28A3</span></div>
    <div class="sw" style="background:#3A1B66;color:#fff"><span class="n">900</span><span>3A1B66</span></div>
  </div>
  <div class="lab">Teal ramp</div>
  <div class="row">
    <div class="sw" style="background:#EAF8F8;color:#044747"><span class="n">50</span><span>EAF8F8</span></div>
    <div class="sw" style="background:#CDEFEF;color:#044747"><span class="n">100</span><span>CDEFEF</span></div>
    <div class="sw" style="background:#86DBDB;color:#044747"><span class="n">300</span><span>86DBDB</span></div>
    <div class="sw" style="background:#3AC8C8;color:#052a2a"><span class="n">500</span><span>3AC8C8</span></div>
    <div class="sw" style="background:#07B5B5;color:#052a2a"><span class="n">600</span><span>07B5B5</span></div>
    <div class="sw" style="background:#067E7E;color:#fff"><span class="n">700</span><span>067E7E</span></div>
    <div class="sw" style="background:#044747;color:#fff"><span class="n">900</span><span>044747</span></div>
  </div>
</div></body></html>
