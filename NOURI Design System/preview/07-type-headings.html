<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:28px;display:grid;grid-template-columns:120px 1fr;gap:18px 24px;align-items:baseline}
.lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
.h1{font-family:var(--font-serif);font-size:34px;line-height:1.1;letter-spacing:-.02em;margin:0}
.h2{font-family:var(--font-serif);font-size:26px;line-height:1.2;letter-spacing:-.01em;margin:0}
.h3{font-family:var(--font-sans);font-weight:600;font-size:22px;margin:0}
.h4{font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0}
</style></head><body><div class="card">
  <div class="lab">H1 · serif 34</div><div class="h1">La perimenopausia no es el final</div>
  <div class="lab">H2 · serif 26</div><div class="h2">Lo que sabemos sobre los sofocos</div>
  <div class="lab">H3 · sans 22</div><div class="h3">Registro de síntomas</div>
  <div class="lab">H4 · sans 18</div><div class="h4">Sueño fragmentado</div>
</div></body></html>
