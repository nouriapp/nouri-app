<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.e{background:var(--paper-2);border:1px solid var(--border);border-radius:12px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-sans);gap:4px}
.n{font-size:12px;font-weight:600}
.h{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}
.xs{box-shadow:0 1px 0 rgba(30,29,43,.04)}
.sm{box-shadow:0 2px 6px -2px rgba(30,29,43,.08),0 1px 2px rgba(30,29,43,.04)}
.md{box-shadow:0 8px 24px -8px rgba(30,29,43,.12),0 2px 6px -3px rgba(30,29,43,.06)}
.lg{box-shadow:0 24px 48px -16px rgba(30,29,43,.18),0 8px 16px -8px rgba(30,29,43,.08)}
</style></head><body><div class="card">
  <div class="e xs"><span class="n">XS</span><span class="h">hairline</span></div>
  <div class="e sm"><span class="n">SM</span><span class="h">card default</span></div>
  <div class="e md"><span class="n">MD</span><span class="h">popover / menu</span></div>
  <div class="e lg"><span class="n">LG</span><span class="h">modal / hero</span></div>
</div></body></html>
