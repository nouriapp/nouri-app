<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.yes,.no{border-radius:12px;padding:14px 16px;font-family:var(--font-sans);font-size:14px;line-height:1.45}
.yes{background:#D6EDE2;color:#1d5a46;border-left:3px solid #2E8F6F}
.no{background:#F3D6D4;color:#6f241f;border-left:3px solid #B4433D}
.lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:6px;opacity:.8}
em{font-family:var(--font-serif);font-style:italic;font-size:16px}
</style></head><body><div class="card">
  <div class="yes">
    <div class="lab">✓ Sí</div>
    Dormiste 5h 42m. Menos que el promedio de tu semana.
  </div>
  <div class="no">
    <div class="lab">✕ No</div>
    <em>Parece que hoy quizás no descansaste lo suficiente, ¿verdad?</em>
  </div>
  <div class="yes">
    <div class="lab">✓ Sí</div>
    Esto no es todo en tu cabeza.
  </div>
  <div class="no">
    <div class="lab">✕ No</div>
    <em>¡Hola, hermosa! Tú puedes con todo ✨</em>
  </div>
</div></body></html>
