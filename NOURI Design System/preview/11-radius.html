<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:28px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.r{background:var(--nouri-purple);width:80px;height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;font-family:var(--font-mono);font-size:10px}
.n{font-family:var(--font-sans);font-weight:600;font-size:12px}
</style></head><body><div class="card">
  <div class="r" style="border-radius:6px"><span class="n">sm</span><span>6</span></div>
  <div class="r" style="border-radius:10px"><span class="n">md</span><span>10</span></div>
  <div class="r" style="border-radius:16px"><span class="n">lg</span><span>16</span></div>
  <div class="r" style="border-radius:24px"><span class="n">xl</span><span>24</span></div>
  <div class="r" style="border-radius:32px"><span class="n">2xl</span><span>32</span></div>
  <div class="r" style="border-radius:999px;width:110px"><span class="n">pill</span><span>999</span></div>
</div></body></html>
