<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:10px;border:1px solid var(--border);padding:12px;height:84px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-sans)}
.sw .n{font-size:12px;font-weight:600}
.sw .h{font-family:var(--font-mono);font-size:10px;opacity:.85}
</style></head><body><div class="card">
  <div class="sw" style="background:#FBF7F1"><span class="n">Paper</span><span class="h">#FBF7F1 · --bg</span></div>
  <div class="sw" style="background:#F4EEE3"><span class="n">Paper 2</span><span class="h">#F4EEE3 · raised</span></div>
  <div class="sw" style="background:#EAE2D3"><span class="n">Paper 3</span><span class="h">#EAE2D3 · hover</span></div>
  <div class="sw" style="background:#1E1D2B;color:#F7F3EB;border-color:#1E1D2B"><span class="n">Inverse</span><span class="h">#1E1D2B · dark</span></div>
  <div class="sw" style="background:#FBF7F1;color:#1E1D2B"><span class="n">Ink 900</span><span class="h">#1E1D2B · fg</span></div>
  <div class="sw" style="background:#FBF7F1;color:#3A3948"><span class="n">Ink 700</span><span class="h">#3A3948</span></div>
  <div class="sw" style="background:#FBF7F1;color:#6B6A7C"><span class="n">Ink 500</span><span class="h">#6B6A7C · muted</span></div>
  <div class="sw" style="background:#FBF7F1;color:#A3A1B2"><span class="n">Ink 300</span><span class="h">#A3A1B2 · subtle</span></div>
</div></body></html>
