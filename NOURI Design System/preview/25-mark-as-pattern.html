<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>

.card{padding:30px 24px;position:relative;height:180px;overflow:hidden}
.content{position:relative;z-index:2}
.eb{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7B39D2;font-weight:500;margin-bottom:8px}

</style></head><body><div class="card">
  <img class="bg" src="../assets/nouri-logo-cream.jpg" alt="">
  <div class="content">

</div></body></html>
