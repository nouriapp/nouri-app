<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{font-family:var(--font-sans);font-weight:500;font-size:15px;padding:12px 22px;border-radius:999px;border:1px solid transparent;cursor:pointer;transition:all .14s cubic-bezier(.22,.61,.36,1)}
.primary{background:#7B39D2;color:#fff}
.primary:hover{background:#5B28A3}
.secondary{background:#FBF7F1;color:#1E1D2B;border-color:#E3DCCC}
.secondary:hover{background:#F4EEE3}
.dark{background:#1E1D2B;color:#F7F3EB}
.ghost{background:transparent;color:#7B39D2}
.ghost:hover{background:#F6EFFE}
.sm{padding:8px 14px;font-size:13px}
.icon{width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:#FBF7F1;border:1px solid #E3DCCC;color:#1E1D2B}
svg{width:18px;height:18px}
</style></head><body><div class="card">
  <button class="btn primary">Registrar síntoma</button>
  <button class="btn secondary">Cancelar</button>
  <button class="btn dark">Empezar</button>
  <button class="btn ghost">Saber más</button>
  <button class="btn primary sm">Guardar</button>
  <button class="btn icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
</div></body></html>
