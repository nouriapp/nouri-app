<!-- Shared boilerplate for preview cards -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--paper); margin: 0; }
  .card { padding: 24px; min-height: 150px; display: block; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { border-radius: var(--r-md); padding: 14px 16px; min-height: 76px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); font-family: var(--font-sans); }
  .swatch .name { font-size: 13px; font-weight: 600; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; opacity: .85; letter-spacing: .02em; }
  .label { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-muted); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
</div>
</body>
</html>
