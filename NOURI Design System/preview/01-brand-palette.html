<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.sw{border-radius:12px;border:1px solid var(--border);padding:12px;height:120px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-sans)}
.sw .n{font-size:12px;font-weight:600}
.sw .h{font-family:var(--font-mono);font-size:10px;opacity:.8}
</style></head><body><div class="card">
  <div class="sw" style="background:#1E1D2B;color:#F7F3EB;border-color:#1E1D2B"><span class="n">Navy</span><span class="h">#1E1D2B</span></div>
  <div class="sw" style="background:#7B39D2;color:#fff;border-color:#7B39D2"><span class="n">Purple</span><span class="h">#7B39D2</span></div>
  <div class="sw" style="background:#07B5B5;color:#052a2a;border-color:#07B5B5"><span class="n">Teal</span><span class="h">#07B5B5</span></div>
  <div class="sw" style="background:#8677C3;color:#fff;border-color:#8677C3"><span class="n">Violet</span><span class="h">#8677C3</span></div>
  <div class="sw" style="background:#D6C7FD;color:#3A1B66"><span class="n">Lavender</span><span class="h">#D6C7FD</span></div>
  <div class="sw" style="background:#B6E8E9;color:#044747"><span class="n">Mint</span><span class="h">#B6E8E9</span></div>
</div></body></html>
