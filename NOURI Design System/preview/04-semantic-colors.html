<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:10px;padding:12px;height:84px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-sans);border:1px solid transparent}
.sw .n{font-size:12px;font-weight:600}
.sw .h{font-family:var(--font-mono);font-size:10px;opacity:.85}
.pair{display:flex;flex-direction:column;gap:4px}
</style></head><body><div class="card">
  <div class="pair">
    <div class="sw" style="background:#2E8F6F;color:#fff"><span class="n">Success</span><span class="h">#2E8F6F</span></div>
    <div class="sw" style="background:#D6EDE2;color:#1d5a46;height:30px"><span class="h">soft · #D6EDE2</span></div>
  </div>
  <div class="pair">
    <div class="sw" style="background:#C88A2E;color:#fff"><span class="n">Warning</span><span class="h">#C88A2E</span></div>
    <div class="sw" style="background:#F4E6CB;color:#7a521b;height:30px"><span class="h">soft · #F4E6CB</span></div>
  </div>
  <div class="pair">
    <div class="sw" style="background:#B4433D;color:#fff"><span class="n">Danger</span><span class="h">#B4433D</span></div>
    <div class="sw" style="background:#F3D6D4;color:#6f241f;height:30px"><span class="h">soft · #F3D6D4</span></div>
  </div>
  <div class="pair">
    <div class="sw" style="background:#07B5B5;color:#052a2a"><span class="n">Info</span><span class="h">#07B5B5</span></div>
    <div class="sw" style="background:#CDEFEF;color:#044747;height:30px"><span class="h">soft · #CDEFEF</span></div>
  </div>
</div></body></html>
