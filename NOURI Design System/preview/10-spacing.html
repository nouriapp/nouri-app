<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.s{background:var(--nouri-purple);border-radius:4px;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:var(--nouri-purple);border-radius:4px}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:4px;text-align:center}
.wrap{display:flex;flex-direction:column;align-items:center}
</style></head><body><div class="card">
  <div class="wrap"><div class="bar" style="width:4px;height:4px"></div><div class="lab">1<br>4</div></div>
  <div class="wrap"><div class="bar" style="width:8px;height:8px"></div><div class="lab">2<br>8</div></div>
  <div class="wrap"><div class="bar" style="width:12px;height:12px"></div><div class="lab">3<br>12</div></div>
  <div class="wrap"><div class="bar" style="width:16px;height:16px"></div><div class="lab">4<br>16</div></div>
  <div class="wrap"><div class="bar" style="width:20px;height:20px"></div><div class="lab">5<br>20</div></div>
  <div class="wrap"><div class="bar" style="width:24px;height:24px"></div><div class="lab">6<br>24</div></div>
  <div class="wrap"><div class="bar" style="width:32px;height:32px"></div><div class="lab">7<br>32</div></div>
  <div class="wrap"><div class="bar" style="width:40px;height:40px"></div><div class="lab">8<br>40</div></div>
  <div class="wrap"><div class="bar" style="width:56px;height:56px"></div><div class="lab">9<br>56</div></div>
  <div class="wrap"><div class="bar" style="width:72px;height:72px"></div><div class="lab">10<br>72</div></div>
</div></body></html>
