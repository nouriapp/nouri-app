<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{background:var(--paper);margin:0}
.card{padding:24px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.b{font-family:var(--font-sans);font-size:12px;font-weight:500;padding:8px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;justify-self:start}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.p-foli{background:#CDEFEF;color:#044747}
.p-ovu{background:#EADCFE;color:#3A1B66}
.p-lut{background:#E5E0F1;color:#4a3f7a}
.p-men{background:#F3D6D4;color:#6f241f}
.p-peri{background:#7B39D2;color:#fff}
.p-meno{background:#07B5B5;color:#052a2a}
</style></head><body><div class="card">
  <span class="b p-foli"><span class="dot"></span>Folicular</span>
  <span class="b p-ovu"><span class="dot"></span>Ovulatoria</span>
  <span class="b p-lut"><span class="dot"></span>Lútea</span>
  <span class="b p-men"><span class="dot"></span>Menstrual</span>
  <span class="b p-peri"><span class="dot"></span>Perimenopausia</span>
  <span class="b p-meno"><span class="dot"></span>Menopausia</span>
</div></body></html>
